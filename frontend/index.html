<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Tester (Minimal)</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 20px auto; padding: 0 10px; }
        section { border: 1px solid #999; padding: 15px; margin-bottom: 15px; }
        h1, h2, h3 { margin-top: 0; }
        .output { background: #eee; padding: 10px; white-space: pre-wrap; font-family: monospace; border: 1px solid #ccc; max-height: 400px; overflow-y: auto; }
        .error { color: red; }
        .hidden { display: none; }
        .row { margin-bottom: 5px; }
        hr { margin: 15px 0; border: none; border-top: 1px dashed #999; }
        .grid { display: flex; gap: 15px; }
        .col { flex: 1; }
        #avatarContainer img { max-width: 100px; display: block; margin-bottom: 10px; border: 1px solid #000; }
    </style>
</head>
<body>

    <h1>API Tester</h1>
    <p>Status: <strong id="authStatus">Not Authenticated</strong></p>

    <div class="grid">
        <div class="col">
            <section>
                <h2>1. Auth</h2>
                <div style="margin-bottom: 10px;">
                    <input type="radio" name="authTab" id="rLogin" checked onchange="toggleAuth()"> <label for="rLogin">Login</label>
                    <input type="radio" name="authTab" id="rReg" onchange="toggleAuth()"> <label for="rReg">Register</label>
                </div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="row"><input type="email" id="l-email" value="test@example.com" placeholder="Email" required></div>
                    <div class="row"><input type="password" id="l-password" value="password123" placeholder="Password" required></div>
                    <button type="submit">Login</button>
                    <a href="http://localhost:8080/api/auth/google/login"><button type="button">Google Login</button></a>
                </form>

                <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
                    <div class="row"><input type="text" id="r-name" placeholder="Full Name"></div>
                    <div class="row"><input type="email" id="r-email" placeholder="Email" required></div>
                    <div class="row"><input type="password" id="r-password" placeholder="Password" required></div>
                    <button type="submit">Register</button>
                </form>

                <hr>
                <button onclick="handleRefreshToken()">Refresh Token</button>
                <button onclick="handleLogout()">Logout</button>
            </section>

            <section>
                <h2>2. Users & Profile</h2>
                <button onclick="getProfile()">Get /me</button>
                <button onclick="getUsers()">Get All Users</button>
                
                <hr>
                <div class="row">
                    <input type="text" id="updateName" placeholder="New Name">
                    <button onclick="updateProfileName()">Update Name</button>
                </div>
                <div class="row">
                    <input type="file" id="avatarFile" accept="image/*">
                </div>
                <button onclick="uploadAvatar()">Set Avatar</button>
                <button onclick="removeAvatar()">Clear Avatar</button>

                <hr>
                <div class="row">
                    <input type="text" id="adminUserId" placeholder="User ID (UUID)">
                </div>
                <button onclick="getUserById()">Get User</button>
                <button onclick="adminDeleteUser()">Delete User</button>
                <br><br>
                <select id="adminUserRole">
                    <option value="true">Admin</option>
                    <option value="false">User</option>
                </select>
                <button onclick="updateUserRole()">Set Role</button>
            </section>

            <section>
                <h2>3. AI Chat</h2>
                <div class="row"><input type="text" id="aiSystemPrompt" placeholder="System Prompt (optional)" style="width: 100%;"></div>
                <div class="row"><textarea id="aiMessage" rows="3" placeholder="Message..." style="width: 100%;" required></textarea></div>
                <button onclick="chatWithAI()">Send to AI</button>
            </section>

            <section>
                <h2>4. Files</h2>
                <button onclick="listFiles()">List My Files</button>
                
                <hr>
                <div class="row">
                    <input type="file" id="genericFile">
                </div>
                <div class="row">
                    <input type="text" id="fileFolder" placeholder="Folder (optional)">
                    <button onclick="uploadGenericFile()">Upload</button>
                </div>

                <hr>
                <div class="row">
                    <input type="text" id="fileKey" placeholder="File Key" style="width: 100%;">
                </div>
                <button onclick="getFileUrl()">Get URL</button>
                <button onclick="downloadFile()">Download</button>
                <button onclick="deleteFile()">Delete</button>
            </section>
        </div>

        <div class="col">
            <section style="position: sticky; top: 20px;">
                <h2>Output</h2>
                <div id="avatarContainer"></div>
                <div id="output" class="output">Waiting for actions...</div>
            </section>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let accessToken = localStorage.getItem('accessToken') || null;

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('auth') === 'success') {
                window.history.replaceState({}, document.title, window.location.pathname);
                await handleRefreshToken();
            }
            if (accessToken) {
                setAuthStatus(accessToken);
                getProfile();
            }
        };

        function toggleAuth() {
            const isLogin = document.getElementById('rLogin').checked;
            document.getElementById('loginForm').className = isLogin ? '' : 'hidden';
            document.getElementById('registerForm').className = isLogin ? 'hidden' : '';
        }

        function setOutput(data, isError = false) {
            const out = document.getElementById('output');
            out.className = 'output ' + (isError ? 'error' : '');
            out.textContent = typeof data === 'object' ? JSON.stringify(data, null, 2) : data;

            const avatarContainer = document.getElementById('avatarContainer');
            avatarContainer.innerHTML = '';
            if (!isError && data && typeof data === 'object') {
                if (data.user_data?.avatar_url) {
                    avatarContainer.innerHTML = `<img src="${data.user_data.avatar_url}">`;
                } else if (Array.isArray(data)) {
                    data.forEach(u => {
                        if (u.user_data?.avatar_url) {
                            avatarContainer.innerHTML += `<img src="${u.user_data.avatar_url}" title="${u.email}">`;
                        }
                    });
                }
            }
        }

        function setAuthStatus(token) {
            accessToken = token;
            const status = document.getElementById('authStatus');
            if (token) {
                localStorage.setItem('accessToken', token);
                status.textContent = 'Authenticated';
                status.style.color = 'green';
            } else {
                localStorage.removeItem('accessToken');
                status.textContent = 'Not Authenticated';
                status.style.color = 'black';
                document.getElementById('avatarContainer').innerHTML = '';
            }
        }

        async function fetchAPI(endpoint, options = {}) {
            if (accessToken && !options.noAuth) {
                options.headers = { ...options.headers, 'Authorization': `Bearer ${accessToken}` };
            }
            try {
                const res = await fetch(`${API_URL}${endpoint}`, options);
                if (res.status === 204) {
                    setOutput("Success (204 No Content)", false);
                    return { ok: true };
                }
                
                const contentType = res.headers.get("content-type");
                if (contentType?.includes("application/octet-stream")) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const disp = res.headers.get('content-disposition');
                    a.download = disp && disp.includes('filename=') ? disp.split('filename=')[1] : "file";
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                    setOutput(`Downloaded: ${a.download}`, false);
                    return { ok: true };
                }

                const data = await res.json();
                if (res.ok) {
                    setOutput(data);
                    return { ok: true, data };
                } else {
                    setOutput(data, true);
                    return { ok: false, data };
                }
            } catch (err) {
                setOutput(err.message, true);
                return { ok: false, err };
            }
        }

        // --- AUTH ---
        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetchAPI('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: lEmail.value, password: lPassword.value }),
                noAuth: true
            });
            if (res.ok) setAuthStatus(res.data.access_token);
            else setAuthStatus(null);
        }

        async function handleRegister(e) {
            e.preventDefault();
            const res = await fetchAPI('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: rEmail.value, password: rPassword.value, full_name: rName.value }),
                noAuth: true
            });
            if (res.ok) setAuthStatus(res.data.access_token);
            else setAuthStatus(null);
        }

        async function handleLogout() {
            if (await fetchAPI('/auth/logout', { method: 'POST' }).then(r => r.ok)) setAuthStatus(null);
        }

        async function handleRefreshToken() {
            const res = await fetchAPI('/auth/refresh', { method: 'POST', noAuth: true });
            if (res.ok) setAuthStatus(res.data.access_token);
        }

        // --- USERS ---
        async function getProfile() { await fetchAPI('/users/me'); }
        async function getUsers() { await fetchAPI('/users'); }
        async function getUserById() { await fetchAPI(`/users/${document.getElementById('adminUserId').value}`); }
        async function adminDeleteUser() { await fetchAPI(`/users/${document.getElementById('adminUserId').value}`, { method: 'DELETE' }); }
        
        async function updateProfileName() {
            await fetchAPI('/users/me', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_name: document.getElementById('updateName').value })
            });
        }

        async function updateUserRole() {
            await fetchAPI(`/users/${document.getElementById('adminUserId').value}/role`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_admin: document.getElementById('adminUserRole').value === 'true' })
            });
        }

        async function uploadAvatar() {
            const f = document.getElementById('avatarFile');
            if (!f.files.length) return setOutput('No file', true);
            const fd = new FormData(); fd.append('file', f.files[0]); fd.append('folder', 'avatars');
            const r = await fetchAPI('/files/upload', { method: 'POST', body: fd });
            if (r.ok) await fetchAPI('/users/me', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ avatar_url: r.data.url }) });
        }

        async function removeAvatar() {
            await fetchAPI('/users/me', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ avatar_url: null }) });
        }

        // --- FILES ---
        async function listFiles() { await fetchAPI('/files'); }
        async function getFileUrl() { await fetchAPI(`/files/${encodeURIComponent(document.getElementById('fileKey').value)}`); }
        async function downloadFile() { await fetchAPI(`/files/${encodeURIComponent(document.getElementById('fileKey').value)}?download=true`); }
        async function deleteFile() { await fetchAPI(`/files/${encodeURIComponent(document.getElementById('fileKey').value)}`, { method: 'DELETE' }); }

        async function uploadGenericFile() {
            const f = document.getElementById('genericFile');
            const d = document.getElementById('fileFolder').value;
            if (!f.files.length) return setOutput('No file', true);
            const fd = new FormData(); fd.append('file', f.files[0]); if(d) fd.append('folder', d);
            await fetchAPI('/files/upload', { method: 'POST', body: fd });
        }

        // --- AI CHAT ---
        async function chatWithAI() {
            setOutput("Loading...");
            const msg = document.getElementById('aiMessage').value;
            const sys = document.getElementById('aiSystemPrompt').value;
            const payload = { message: msg };
            if (sys) payload.system_prompt = sys;
            await fetchAPI('/ai/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        }

        const lEmail = document.getElementById('l-email');
        const lPassword = document.getElementById('l-password');
        const rName = document.getElementById('r-name');
        const rEmail = document.getElementById('r-email');
        const rPassword = document.getElementById('r-password');
    </script>
</body>
</html>
